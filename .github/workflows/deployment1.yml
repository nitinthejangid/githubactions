name: Deployment Exercise 1
on: push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v3
      - name: install the dependencies
        run: npm ci
      - name: run Lint
        run: npm run lint
      - name: test code
        run: npm run test
      - name: build code
        run: npm run build
      - name: deploy code
        run: echo "deploying"
